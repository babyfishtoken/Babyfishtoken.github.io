<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>استخر نقدینگی | پوزیشن‌های من</title>
    <!-- فونت‌های اینتر و وزیر -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Inter', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 2rem;
            color: #1e2f3a;
        }

        /* کارت اصلی */
        .main-card {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(17, 45, 65, 0.2);
            overflow: hidden;
            padding: 2rem 2rem 0 2rem;
            border: 1px solid #e3eef7;
        }

        /* ========== تیتر ========== */
        .hero {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 2.5rem);
            font-weight: 650;
            letter-spacing: -0.02em;
            color: #1a3849;
            line-height: 1.2;
        }

        /* ========== زیرتیتر ========== */
        .subhead {
            font-size: 0.95rem;
            font-weight: 350;
            color: #3b5b70;
            max-width: 580px;
            margin: 0 auto 1.5rem auto;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #b8cfde;
            text-align: center;
        }

        /* ========== بخش کیف پول ========== */
        .wallet-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            gap: 0.8rem;
        }

        .wallet-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        #wallet-btn {
            display: inline-block;
        }

        .disconnect-btn {
            background: #f0f0f0;
            border: 1px solid #d0ddee;
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e3f50;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.15s;
        }

        .disconnect-btn:hover {
            background: #e0e0e0;
            border-color: #a0b8cc;
        }

        .wallet-address {
            font-size: 0.8rem;
            color: #5f7d94;
            background: #e9f0f6;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            direction: ltr;
            display: inline-block;
        }

        .connect-message {
            color: #5f7d94;
            font-size: 0.9rem;
            background: #edf4fa;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            border: 1px solid #c5d9ec;
            width: fit-content;
            margin: 0 auto;
        }

        /* ========== بخش پوزیشن‌ها ========== */
        .positions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .positions-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .positions-title h2 {
            font-size: 1.3rem;
            font-weight: 620;
            color: #1f475b;
        }

        .new-button {
            background: #254e64;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #163847;
        }

        .new-button:hover {
            background: #2d5c77;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-item {
            background: white;
            border: 1px solid #cbdbe9;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            color: #1e3f50;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .filter-item:hover {
            background: #f0f7fc;
        }

        /* ========== لیست پوزیشن‌ها ========== */
        .positions-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            min-height: 300px;
        }

        /* استایل لودینگ با کارت‌های خالی و دایره چرخان */
        .loading-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .skeleton-card {
            background: #f5f9fc;
            border-radius: 18px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #d0e2ef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: relative;
            overflow: hidden;
        }

        /* افکت لودینگ روی کارت‌ها */
        .skeleton-card::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(200, 220, 240, 0.3),
                transparent
            );
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .skeleton-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .skeleton-icons {
            display: flex;
            align-items: center;
        }

        .skeleton-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(90deg, #d0e0ee 25%, #e0eef8 50%, #d0e0ee 75%);
            background-size: 200% 100%;
            animation: loading-gradient 1.5s infinite;
            border-radius: 50%;
        }

        .skeleton-icon.secondary {
            margin-right: -8px;
        }

        .skeleton-details {
            margin-right: 0.3rem;
        }

        .skeleton-line {
            height: 16px;
            background: linear-gradient(90deg, #d0e0ee 25%, #e0eef8 50%, #d0e0ee 75%);
            background-size: 200% 100%;
            animation: loading-gradient 1.5s infinite;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .skeleton-line.short {
            width: 80px;
        }

        .skeleton-line.medium {
            width: 120px;
        }

        .skeleton-stats {
            display: flex;
            gap: 2rem;
        }

        .skeleton-stat {
            text-align: right;
        }

        .skeleton-stat .skeleton-line {
            width: 60px;
            margin-bottom: 4px;
        }

        .skeleton-stat .skeleton-line.small {
            width: 40px;
        }

        .skeleton-actions {
            display: flex;
            gap: 0.5rem;
        }

        .skeleton-action {
            width: 36px;
            height: 36px;
            background: linear-gradient(90deg, #d0e0ee 25%, #e0eef8 50%, #d0e0ee 75%);
            background-size: 200% 100%;
            animation: loading-gradient 1.5s infinite;
            border-radius: 50%;
        }

        @keyframes loading-gradient {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* دایره چرخان در بالای کارت‌ها */
        .spinner-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .loading-spinner {
            width: 30px;
            height: 30px;
            border: 3px solid #e0e9f2;
            border-top: 3px solid #254e64;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* استایل پیام خالی */
        .empty-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 0;
            background: #f5f9fc;
            border-radius: 20px;
            border: 1px solid #d0e2ef;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-text {
            color: #1f475b;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
        }

        .empty-subtext {
            color: #5f7d94;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* استایل محتوای مخفی */
        .hidden {
            display: none !important;
        }

        /* ========== فوتر با کپی‌رایت ========== */
        .footer-copyright {
            text-align: center;
            padding: 1.2rem 0.5rem 1.5rem 0.5rem;
            border-top: 1px solid #c2d7e9;
            color: #386277;
            font-size: 0.85rem;
            font-weight: 330;
            margin: 0 -2rem;
            padding-left: 2rem;
            padding-right: 2rem;
            background: #f2f9ff;
        }

        .footer-copyright span {
            font-weight: 430;
            color: #124a61;
        }

        /* ========== ریسپانسیو ========== */
        @media screen and (max-width: 600px) {
            body { padding: 1rem; }
            .main-card { padding: 1.2rem 1.2rem 0 1.2rem; border-radius: 20px; }
            .positions-header { flex-direction: column; align-items: flex-start; }
            .wallet-row { flex-direction: column; }
            .skeleton-card { flex-direction: column; align-items: flex-start; }
            .skeleton-stats { width: 100%; justify-content: space-between; }
            .skeleton-actions { width: 100%; justify-content: flex-end; }
            .footer-copyright { margin: 0 -1.2rem; padding-left: 1.2rem; padding-right: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- تیتر -->
        <section class="hero">
            <h1>استخر نقدینگی هوشمند</h1>
        </section>

        <!-- زیرتیتر -->
        <div class="subhead">
            مدیریت نقدینگی با بهره‌وری بالا · کاملاً شفاف و سریع
        </div>

        <!-- بخش کیف پول -->
        <div class="wallet-section">
            <div class="wallet-row">
                <div id="wallet-btn"></div>
                <button id="disconnectBtn" class="disconnect-btn hidden">
                    <span>🔌</span> قطع اتصال
                </button>
            </div>
            <div id="walletAddress" class="wallet-address"></div>
            <div id="connectMessage" class="connect-message">🔌 لطفاً کیف پول خود را متصل کنید</div>
        </div>

        <!-- بخش پوزیشن‌ها (ابتدا مخفی) -->
        <div id="positionsSection" class="hidden">
            <div class="positions-header">
                <div class="positions-title">
                    <h2>Your positions</h2>
                    <button class="new-button" onclick="alert('ایجاد پوزیشن جدید')">
                        <span>+ New</span>
                    </button>
                </div>
                <div class="filters">
                    <div class="filter-item" onclick="alert('فیلتر وضعیت')">
                        Status ▼
                    </div>
                    <div class="filter-item" onclick="alert('فیلتر پروتکل')">
                        Protocol ▼
                    </div>
                </div>
            </div>

            <!-- لیست پوزیشن‌ها -->
            <div id="positionsList" class="positions-list">
                <!-- محتوا توسط جاوااسکریپت پر می‌شود -->
            </div>
        </div>

        <!-- کپی‌رایت -->
        <div class="footer-copyright">
            © ۲۰۲۵ استخر نقدینگی هوشمند. تمامی حقوق محفوظ است. | طراحی متوازن و حرفه‌ای
            <span>— Positions v1.0</span>
        </div>
    </div>

    <!-- Web3Modal و Wagmi -->
    <script type="module">
        import { createWeb3Modal, defaultWagmiConfig } from "https://esm.sh/@web3modal/wagmi";
        import { mainnet, polygon, bsc } from "https://esm.sh/wagmi/chains";
        import { watchAccount, disconnect, getAccount } from "https://esm.sh/wagmi/actions";

        // ==================== تنظیمات ====================
        const projectId = "96f13374b0fe2f629a925617de0a2ba3";
        const chains = [mainnet, polygon, bsc];

        const wagmiConfig = defaultWagmiConfig({
            chains,
            projectId,
            metadata: { name: "Liquidity Pools", description: "", url: window.location.href, icons: [] }
        });

        // ایجاد دکمه اتصال کیف پول
        createWeb3Modal({ wagmiConfig, projectId, chains });
        const btn = document.createElement("w3m-button");
        document.getElementById("wallet-btn").appendChild(btn);

        // عناصر DOM
        const walletAddressEl = document.getElementById('walletAddress');
        const connectMessageEl = document.getElementById('connectMessage');
        const positionsSection = document.getElementById('positionsSection');
        const positionsList = document.getElementById('positionsList');
        const disconnectBtn = document.getElementById('disconnectBtn');

        // متغیر وضعیت اتصال
        let loadingTimer = null;

        // تابع ایجاد کارت‌های خالی با لودینگ
        function renderSkeletonWithSpinner() {
            positionsList.innerHTML = `
                <div class="spinner-container">
                    <div class="loading-spinner"></div>
                </div>
                <div class="loading-container">
                    <!-- کارت اسکلتون اول -->
                    <div class="skeleton-card">
                        <div class="skeleton-left">
                            <div class="skeleton-icons">
                                <div class="skeleton-icon"></div>
                                <div class="skeleton-icon secondary"></div>
                            </div>
                            <div class="skeleton-details">
                                <div class="skeleton-line short"></div>
                                <div class="skeleton-line medium" style="margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="skeleton-stats">
                            <div class="skeleton-stat">
                                <div class="skeleton-line small"></div>
                                <div class="skeleton-line"></div>
                            </div>
                            <div class="skeleton-stat">
                                <div class="skeleton-line small"></div>
                                <div class="skeleton-line"></div>
                            </div>
                        </div>
                        <div class="skeleton-actions">
                            <div class="skeleton-action"></div>
                            <div class="skeleton-action"></div>
                        </div>
                    </div>

                    <!-- کارت اسکلتون دوم -->
                    <div class="skeleton-card">
                        <div class="skeleton-left">
                            <div class="skeleton-icons">
                                <div class="skeleton-icon"></div>
                                <div class="skeleton-icon secondary"></div>
                            </div>
                            <div class="skeleton-details">
                                <div class="skeleton-line short"></div>
                                <div class="skeleton-line medium" style="margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="skeleton-stats">
                            <div class="skeleton-stat">
                                <div class="skeleton-line small"></div>
                                <div class="skeleton-line"></div>
                            </div>
                            <div class="skeleton-stat">
                                <div class="skeleton-line small"></div>
                                <div class="skeleton-line"></div>
                            </div>
                        </div>
                        <div class="skeleton-actions">
                            <div class="skeleton-action"></div>
                            <div class="skeleton-action"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // تابع ایجاد پیام خالی
        function renderEmpty() {
            positionsList.innerHTML = `
                <div class="empty-container">
                    <div class="empty-icon">🏊</div>
                    <div class="empty-text">فعلاً استخری توسط سایت ما ایجاد نکردید</div>
                    <div class="empty-subtext">با کلیک روی + New اولین استخر خود را ایجاد کنید</div>
                </div>
            `;
        }

        // تابع شروع لودینگ ۸ ثانیه‌ای
        function startLoadingSequence() {
            // نمایش لودینگ
            renderSkeletonWithSpinner();
            
            // پاک کردن تایمر قبلی اگر وجود دارد
            if (loadingTimer) {
                clearTimeout(loadingTimer);
            }
            
            // تنظیم تایمر جدید برای ۸ ثانیه بعد
            loadingTimer = setTimeout(() => {
                renderEmpty();
            }, 8000);
        }

        // تابع قطع اتصال کیف پول با پاکسازی کامل حافظه
        async function handleDisconnect() {
            try {
                // قطع اتصال کیف پول
                await disconnect(wagmiConfig);
                
                // پاک کردن تمام تایمرها
                if (loadingTimer) {
                    clearTimeout(loadingTimer);
                    loadingTimer = null;
                }
                
                // مخفی کردن تمام بخش‌ها
                positionsSection.classList.add('hidden');
                disconnectBtn.classList.add('hidden');
                
                // پاک کردن تمام متن‌ها و محتواها
                walletAddressEl.innerText = '';
                connectMessageEl.innerText = "🔌 لطفاً کیف پول خود را متصل کنید";
                positionsList.innerHTML = '';
                
                // پاک کردن stateهای داخلی Web3Modal
                // این کار باعث می‌شود دکمه اتصال به حالت اولیه برگردد
                const modal = document.querySelector('w3m-modal');
                if (modal) {
                    modal.remove();
                }
                
                // بازگرداندن دکمه اتصال به حالت اولیه
                // با حذف و اضافه کردن مجدد دکمه، حافظه آن پاک می‌شود
                const walletBtnContainer = document.getElementById('wallet-btn');
                walletBtnContainer.innerHTML = '';
                const newBtn = document.createElement("w3m-button");
                walletBtnContainer.appendChild(newBtn);
                
                console.log('✅ اتصال قطع و حافظه پاکسازی شد');
                
            } catch (error) {
                console.error('خطا در قطع اتصال:', error);
            }
        }

        // تابع به‌روزرسانی وضعیت اتصال
        function updateWalletState(account) {
            if (account?.address) {
                // کیف پول متصل است
                const shortAddress = `${account.address.slice(0,6)}...${account.address.slice(38)}`;
                walletAddressEl.innerText = `✅ ${shortAddress}`;
                connectMessageEl.innerText = "✅ کیف پول متصل است";
                
                // نمایش دکمه قطع اتصال
                disconnectBtn.classList.remove('hidden');
                
                // نمایش بخش پوزیشن‌ها
                positionsSection.classList.remove('hidden');
                
                // شروع لودینگ ۸ ثانیه‌ای
                startLoadingSequence();
                
            } else {
                // کیف پول قطع است - پاکسازی کامل
                walletAddressEl.innerText = '';
                connectMessageEl.innerText = "🔌 لطفاً کیف پول خود را متصل کنید";
                
                // مخفی کردن دکمه قطع اتصال
                disconnectBtn.classList.add('hidden');
                
                // مخفی کردن بخش پوزیشن‌ها
                positionsSection.classList.add('hidden');
                
                // پاک کردن تایمر
                if (loadingTimer) {
                    clearTimeout(loadingTimer);
                    loadingTimer = null;
                }
                
                // پاک کردن لیست پوزیشن‌ها
                positionsList.innerHTML = '';
            }
        }

        // دکمه قطع اتصال
        disconnectBtn.addEventListener('click', handleDisconnect);

        // نظاره‌گر تغییرات حساب
        watchAccount(wagmiConfig, {
            onChange(account) {
                console.log('تغییر وضعیت حساب:', account);
                updateWalletState(account);
            }
        });

        // بررسی وضعیت اولیه - هر ۱۰۰ میلی‌ثانیه برای ۳ ثانیه
        let checkCount = 0;
        const maxChecks = 30; // ۳ ثانیه (هر ۱۰۰ms)
        
        const checkInterval = setInterval(() => {
            try {
                const account = getAccount(wagmiConfig);
                if (account?.address) {
                    console.log('✅ کیف پول متصل است:', account.address);
                    updateWalletState(account);
                    clearInterval(checkInterval);
                }
                
                checkCount++;
                if (checkCount >= maxChecks) {
                    clearInterval(checkInterval);
                    console.log('⏰ پایان بررسی دوره‌ای - کیف پول متصل نیست');
                }
            } catch (error) {
                console.error('خطا:', error);
                checkCount++;
                if (checkCount >= maxChecks) {
                    clearInterval(checkInterval);
                }
            }
        }, 100);
    </script>
</body>
                        </html>
