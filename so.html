<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اتصال کیف پول سولانا</title>  <style>
    body {
      margin: 0;
      font-family: Tahoma, sans-serif;
      background: linear-gradient(135deg,#0f172a,#020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      color: #9ca3af;
      font-size: 14px;
    }

    button {
      margin-top: 25px;
      padding: 14px 25px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: linear-gradient(90deg,#8b5cf6,#22d3ee);
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    .address {
      margin-top: 20px;
      font-size: 13px;
      word-break: break-all;
      color: #22d3ee;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #4ade80;
    }
  </style></head><body>
  <div class="card">
    <h1>کیف پول سولانا</h1>
    <p>اتصال سریع Phantom و سایر کیف پول‌ها</p><button onclick="connectWallet()">اتصال کیف پول</button>

<div class="status" id="status"></div>
<div class="address" id="address"></div>

  </div>  <script>
    let provider;

    async function connectWallet() {
      if ("solana" in window) {
        provider = window.solana;

        try {
          const resp = await provider.connect();

          document.getElementById("status").innerText = "کیف پول متصل شد";
          document.getElementById("address").innerText = resp.publicKey.toString();
        } catch (err) {
          document.getElementById("status").innerText = "کاربر اتصال را رد کرد";
        }
      } else {
        alert("کیف پول Phantom نصب نیست");
      }
    }
  </script></body>
            </html>
