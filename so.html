<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connect Solana Wallet</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;font-family:Vazirmatn,sans-serif}
body{
  margin:0;
  background:radial-gradient(circle at top,#0f172a,#020617);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  width:100%;
  max-width:420px;
  background:#0b1120;
  padding:35px;
  border-radius:22px;
  box-shadow:0 30px 70px rgba(0,0,0,.7);
  text-align:center;
}

h1{font-size:22px;margin-bottom:8px}
p{color:#94a3b8;font-size:14px;margin-bottom:25px}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  background:linear-gradient(90deg,#8b5cf6,#22d3ee);
}

.status{margin-top:20px;color:#4ade80;font-size:14px}
.address{margin-top:10px;color:#22d3ee;font-size:13px;word-break:break-all}

</style></head><body><div class="card">
<h1>اتصال حرفه‌ای سولانا</h1>
<p>بدون باز شدن سایت داخل کیف پول</p><button onclick="connect()">Connect Wallet</button>

<div id="status" class="status"></div>
<div id="address" class="address"></div>
</div><script>
let provider;

async function connect(){

  try{

    // تشخیص دسکتاپ
    if(window.solana && window.solana.isPhantom){

      provider = window.solana;

      const res = await provider.connect({onlyIfTrusted:false});

      success(res.publicKey.toString());

      return;
    }

    // اگر موبایل و کیف پول نصب نیست
    const ua = navigator.userAgent.toLowerCase();

    const isMobile = /android|iphone|ipad|ipod/.test(ua);

    if(isMobile){

      document.getElementById("status").innerText =
        "کیف پول Phantom را نصب کنید و از داخل آن سایت را باز کنید";

    }else{

      document.getElementById("status").innerText =
        "افزونه Phantom نصب نیست";

    }

  }catch(e){
    document.getElementById("status").innerText="اتصال رد شد";
  }
}

function success(addr){
  document.getElementById("status").innerText="کیف پول متصل شد";
  document.getElementById("address").innerText=addr;
}

</script></body>
</html>
