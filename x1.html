<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallet Connect - صفحه X1</title>
<style>
    body {
        background: #0f172a;
        color: white;
        text-align: center;
        padding-top: 60px;
        font-family: sans-serif;
        margin: 0;
        min-height: 100vh;
    }
    .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
    }
    .nav-links {
        margin: 30px 0;
        display: flex;
        gap: 20px;
        justify-content: center;
    }
    .nav-links a {
        color: #60a5fa;
        text-decoration: none;
        padding: 10px 20px;
        border: 1px solid #334155;
        border-radius: 8px;
        transition: all 0.3s;
    }
    .nav-links a:hover {
        background: #1e293b;
        border-color: #60a5fa;
    }
    .wallet-info {
        margin-top: 40px;
        padding: 20px;
        background: #1e293b;
        border-radius: 12px;
        display: none;
    }
    .wallet-info.show {
        display: block;
    }
    .address {
        background: #0f172a;
        padding: 10px;
        border-radius: 8px;
        font-family: monospace;
        word-break: break-all;
    }
    .connect-btn {
        background: #3b82f6;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
        margin: 10px;
    }
    .connect-btn:hover {
        background: #2563eb;
        transform: translateY(-2px);
    }
    .connect-btn.connected {
        background: #10b981;
    }
    .connect-btn.connected:hover {
        background: #059669;
    }
    .disconnect-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        margin-top: 10px;
    }
    .disconnect-btn:hover {
        background: #dc2626;
    }
</style>
</head>
<body>
<div class="container">
    <h2>🔷 صفحه X1 - Polygon Wallet</h2>
    
    <div class="nav-links">
        <a href="x1.html">🏠 صفحه X1</a>
        <a href="x2.html">🔄 صفحه X2</a>
    </div>

    <div id="wallet-btn">
        <button id="custom-connect-btn" class="connect-btn">اتصال کیف پول</button>
    </div>
    
    <div id="wallet-info" class="wallet-info">
        <h3>📌 اطلاعات کیف پول</h3>
        <div id="account-address" class="address">وصل نشده</div>
        <div id="network-info" style="margin-top: 10px; color: #94a3b8;"></div>
        <button id="disconnect-btn" class="disconnect-btn">قطع اتصال</button>
    </div>
</div>

<script type="module">
import { createWeb3Modal, defaultWagmiConfig } from "https://esm.sh/@web3modal/wagmi";
import { polygon, polygonAmoy } from "https://esm.sh/wagmi/chains";
import { getAccount, watchAccount } from "https://esm.sh/@wagmi/core";
import { connect, disconnect } from "https://esm.sh/@wagmi/core";
import { injected } from "https://esm.sh/@wagmi/connectors";

const projectId = "96f13374b0fe2f629a925617de0a2ba3";

const metadata = {
    name: "My Polygon Website",
    description: "Web3 Polygon App",
    url: window.location.origin,
    icons: []
};

const chains = [polygon, polygonAmoy];

const wagmiConfig = defaultWagmiConfig({
    chains,
    projectId,
    metadata,
    connectors: [injected()] // اضافه کردن connectors
});

// ایجاد مودال
const modal = createWeb3Modal({
    wagmiConfig,
    projectId,
    chains,
    defaultChain: polygon
});

// المنت‌ها
const connectBtn = document.getElementById('custom-connect-btn');
const walletInfo = document.getElementById('wallet-info');
const addressDisplay = document.getElementById('account-address');
const networkDisplay = document.getElementById('network-info');
const disconnectBtn = document.getElementById('disconnect-btn');

// تابع به‌روزرسانی وضعیت
async function updateConnectionStatus() {
    const account = getAccount(wagmiConfig);
    
    if (account.isConnected) {
        // اتصال برقرار است
        connectBtn.textContent = '✅ کیف پول متصل است';
        connectBtn.classList.add('connected');
        walletInfo.classList.add('show');
        addressDisplay.textContent = account.address;
        
        // تشخیص شبکه
        const chainName = account.chainId === 137 ? 'Polygon Mainnet' : 
                         account.chainId === 80002 ? 'Polygon Amoy' : 
                         'Network ' + account.chainId;
        networkDisplay.textContent = `🌐 ${chainName}`;
        
        // ذخیره در localStorage
        localStorage.setItem('walletConnected', 'true');
        localStorage.setItem('walletAddress', account.address);
        localStorage.setItem('walletChainId', account.chainId);
    } else {
        // عدم اتصال
        connectBtn.textContent = 'اتصال کیف پول';
        connectBtn.classList.remove('connected');
        walletInfo.classList.remove('show');
        addressDisplay.textContent = 'وصل نشده';
        networkDisplay.textContent = '';
        
        // چک کردن اتصال قبلی
        const wasConnected = localStorage.getItem('walletConnected');
        if (wasConnected === 'true') {
            connectBtn.textContent = '🔄 تلاش برای اتصال مجدد...';
            // تلاش برای اتصال خودکار
            tryAutoConnect();
        }
    }
}

// تابع اتصال خودکار
async function tryAutoConnect() {
    try {
        const lastAddress = localStorage.getItem('walletAddress');
        if (lastAddress) {
            // تلاش برای اتصال با injected connector
            const result = await connect(wagmiConfig, {
                connector: injected()
            });
            if (result) {
                updateConnectionStatus();
            }
        }
    } catch (error) {
        console.log('Auto connect failed:', error);
        localStorage.removeItem('walletConnected');
        localStorage.removeItem('walletAddress');
        localStorage.removeItem('walletChainId');
        updateConnectionStatus();
    }
}

// رویداد کلیک برای اتصال
connectBtn.addEventListener('click', async () => {
    const account = getAccount(wagmiConfig);
    
    if (account.isConnected) {
        // اگر متصل است، مودال را باز کن
        modal.open();
    } else {
        // اگر متصل نیست، اتصال برقرار کن
        try {
            connectBtn.textContent = '⏳ در حال اتصال...';
            const result = await connect(wagmiConfig, {
                connector: injected()
            });
            if (result) {
                updateConnectionStatus();
            }
        } catch (error) {
            console.error('Connection failed:', error);
            connectBtn.textContent = '❌ خطا در اتصال';
            setTimeout(() => updateConnectionStatus(), 2000);
        }
    }
});

// قطع اتصال
disconnectBtn.addEventListener('click', async () => {
    try {
        await disconnect(wagmiConfig);
        localStorage.removeItem('walletConnected');
        localStorage.removeItem('walletAddress');
        localStorage.removeItem('walletChainId');
        updateConnectionStatus();
    } catch (error) {
        console.error('Disconnect failed:', error);
    }
});

// مانیتور کردن تغییرات
watchAccount(wagmiConfig, {
    onChange(account) {
        updateConnectionStatus();
    }
});

// بررسی اولیه و تلاش برای اتصال خودکار
updateConnectionStatus();

// چک کردن مجدد بعد از 1 ثانیه
setTimeout(() => {
    updateConnectionStatus();
}, 1000);
</script>
</body>
    </html>
