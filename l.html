<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>استخر نقدینگی | پوزیشن‌های من</title>
    <!-- فونت‌های اینتر و وزیر -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Inter', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 2rem;
            color: #1e2f3a;
        }

        /* کارت اصلی */
        .main-card {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(17, 45, 65, 0.2);
            overflow: hidden;
            padding: 2.5rem 2.5rem 0 2.5rem;
            border: 1px solid #e3eef7;
        }

        /* ========== تیتر ========== */
        .hero {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 6vw, 3rem);
            font-weight: 650;
            letter-spacing: -0.02em;
            color: #1a3849;
            line-height: 1.2;
        }

        /* ========== زیرتیتر و دکمه کیف پول ========== */
        .subhead-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .subhead {
            font-size: 1rem;
            font-weight: 350;
            color: #3b5b70;
            max-width: 580px;
            margin: 0 auto 1.2rem auto;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #b8cfde;
            text-align: center;
        }

        .wallet-button {
            background: #254e64;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.8rem;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px -3px rgba(20, 55, 75, 0.4);
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #163847;
            margin-bottom: 0.5rem;
        }

        .wallet-button:hover {
            background: #2d5c77;
            transform: translateY(-1px);
        }

        .wallet-dot {
            width: 8px;
            height: 8px;
            background: #4cd964;
            border-radius: 50%;
            display: inline-block;
        }

        .wallet-address {
            font-size: 0.8rem;
            color: #5f7d94;
            background: #e9f0f6;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            direction: ltr;
            display: inline-block;
        }

        /* ========== بخش UNI ========== */
        .uni-section {
            background: #f5f9fc;
            border-radius: 20px;
            padding: 1.5rem 1.8rem;
            border: 1px solid #d0e2ef;
            box-shadow: 0 5px 12px -10px #1b3d4f;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .uni-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .uni-icon {
            width: 48px;
            height: 48px;
            background: #ff6b4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .uni-text h3 {
            font-size: 1.3rem;
            font-weight: 620;
            color: #1f475b;
            margin-bottom: 0.2rem;
        }

        .uni-text p {
            font-size: 0.9rem;
            color: #3b5b70;
        }

        .uni-right {
            text-align: left;
        }

        .rewards-earned {
            font-size: 0.85rem;
            color: #5f7d94;
            margin-bottom: 0.2rem;
        }

        .rewards-amount {
            font-size: 1.5rem;
            font-weight: 650;
            color: #1a3849;
        }

        /* ========== بخش یافتن استخرها ========== */
        .find-pools {
            background: #edf4fa;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #c5d9ec;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .find-pools p {
            color: #1e3f50;
            font-size: 0.95rem;
        }

        .find-pools-button {
            background: transparent;
            border: 1.5px solid #254e64;
            border-radius: 30px;
            padding: 0.5rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #254e64;
            cursor: pointer;
            transition: all 0.15s;
        }

        .find-pools-button:hover {
            background: #254e64;
            color: white;
        }

        /* ========== بخش پوزیشن‌ها ========== */
        .positions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .positions-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .positions-title h2 {
            font-size: 1.3rem;
            font-weight: 620;
            color: #1f475b;
        }

        .new-button {
            background: #254e64;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #163847;
        }

        .new-button:hover {
            background: #2d5c77;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-item {
            background: white;
            border: 1px solid #cbdbe9;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            color: #1e3f50;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .filter-item:hover {
            background: #f0f7fc;
        }

        /* ========== لیست پوزیشن‌ها ========== */
        .positions-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
            min-height: 350px;
        }

        /* استایل لودینگ با کارت‌های خالی */
        .loading-skeleton {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .skeleton-card {
            background: #f5f9fc;
            border-radius: 18px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #d0e2ef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            opacity: 0.7;
        }

        .skeleton-left {
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }

        .skeleton-icons {
            display: flex;
            align-items: center;
        }

        .skeleton-icon {
            width: 32px;
            height: 32px;
            background: #d0e0ee;
            border-radius: 50%;
        }

        .skeleton-icon.secondary {
            margin-right: -8px;
            background: #c0d0e2;
        }

        .skeleton-details {
            margin-right: 0.5rem;
        }

        .skeleton-line {
            height: 16px;
            background: #d0e0ee;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .skeleton-line.short {
            width: 80px;
        }

        .skeleton-line.medium {
            width: 120px;
        }

        .skeleton-line.long {
            width: 180px;
        }

        .skeleton-stats {
            display: flex;
            gap: 2rem;
        }

        .skeleton-stat {
            text-align: right;
        }

        .skeleton-stat .skeleton-line {
            width: 60px;
            margin-bottom: 4px;
        }

        .skeleton-stat .skeleton-line.small {
            width: 40px;
        }

        .skeleton-actions {
            display: flex;
            gap: 0.5rem;
        }

        .skeleton-action {
            width: 36px;
            height: 36px;
            background: #d0e0ee;
            border-radius: 50%;
        }

        /* استایل پیام خالی */
        .empty-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3.5rem 0;
            background: #f5f9fc;
            border-radius: 20px;
            border: 1px solid #d0e2ef;
        }

        .empty-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-text {
            color: #1f475b;
            font-size: 1.2rem;
            font-weight: 500;
            text-align: center;
        }

        .empty-subtext {
            color: #5f7d94;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* ========== فوتر با کپی‌رایت ========== */
        .footer-copyright {
            text-align: center;
            padding: 1.5rem 0.5rem 1.8rem 0.5rem;
            border-top: 1px solid #c2d7e9;
            color: #386277;
            font-size: 0.9rem;
            font-weight: 330;
            margin: 0 -2.5rem;
            padding-left: 2.5rem;
            padding-right: 2.5rem;
            background: #f2f9ff;
        }

        .footer-copyright span {
            font-weight: 430;
            color: #124a61;
        }

        /* ========== ریسپانسیو ========== */
        @media screen and (max-width: 700px) {
            body { padding: 1rem; }
            .main-card { padding: 1.5rem 1.5rem 0 1.5rem; border-radius: 20px; }
            .skeleton-card { flex-direction: column; align-items: flex-start; }
            .skeleton-stats { width: 100%; justify-content: space-between; }
            .skeleton-actions { width: 100%; justify-content: flex-end; }
            .footer-copyright { margin: 0 -1.5rem; padding-left: 1.5rem; padding-right: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- تیتر -->
        <section class="hero">
            <h1>استخر نقدینگی هوشمند</h1>
        </section>

        <!-- زیرتیتر و دکمه اتصال کیف پول -->
        <div class="subhead-section">
            <div class="subhead">
                مدیریت نقدینگی با بهره‌وری بالا · کاملاً شفاف و سریع
            </div>
            <button class="wallet-button" onclick="alert('اتصال به کیف پول (نسخه آزمایشی)')">
                <span class="wallet-dot"></span>
                ۰x71C...f3E2
            </button>
        </div>

        <!-- بخش UNI -->
        <div class="uni-section">
            <div class="uni-left">
                <div class="uni-icon">🦄</div>
                <div class="uni-text">
                    <h3>UNI 🐟</h3>
                    <p>Collect rewards</p>
                </div>
            </div>
            <div class="uni-right">
                <div class="rewards-earned">Rewards earned</div>
                <div class="rewards-amount">$۱۲.۴۵</div>
            </div>
        </div>

        <!-- بخش یافتن استخرها -->
        <div class="find-pools">
            <p>Find pools with UNI rewards →</p>
            <button class="find-pools-button" onclick="alert('جستجوی استخرها')">Eligible pools have token rewards so you can earn more</button>
        </div>

        <!-- بخش پوزیشن‌ها -->
        <div class="positions-header">
            <div class="positions-title">
                <h2>Your positions</h2>
                <button class="new-button" onclick="alert('ایجاد پوزیشن جدید')">
                    <span>+ New</span>
                </button>
            </div>
            <div class="filters">
                <div class="filter-item" onclick="alert('فیلتر وضعیت')">
                    Status ▼
                </div>
                <div class="filter-item" onclick="alert('فیلتر پروتکل')">
                    Protocol ▼
                </div>
            </div>
        </div>

        <!-- لیست پوزیشن‌ها -->
        <div id="positionsList" class="positions-list">
            <!-- محتوا توسط جاوااسکریپت پر می‌شود -->
        </div>

        <!-- کپی‌رایت -->
        <div class="footer-copyright">
            © ۲۰۲۵ استخر نقدینگی هوشمند. تمامی حقوق محفوظ است. | طراحی متوازن و حرفه‌ای
            <span>— Positions v1.0</span>
        </div>
    </div>

    <script>
        // عنصر لیست پوزیشن‌ها
        const positionsList = document.getElementById('positionsList');

        // تابع ایجاد اسکلتون (کارت‌های خالی با پس‌زمینه)
        function renderSkeleton() {
            // ایجاد ۲ کارت اسکلتون (مطابق تصویر)
            positionsList.innerHTML = `
                <div class="loading-skeleton">
                    <!-- کارت اسکلتون اول -->
                    <div class="skeleton-card">
                        <div class="skeleton-left">
                            <div class="skeleton-icons">
                                <div class="skeleton-icon"></div>
                                <div class="skeleton-icon secondary"></div>
                            </div>
                            <div class="skeleton-details">
                                <div class="skeleton-line short" style="width: 100px;"></div>
                                <div class="skeleton-line medium" style="width: 140px; margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="skeleton-stats">
                            <div class="skeleton-stat">
                                <div class="skeleton-line small" style="width: 50px;"></div>
                                <div class="skeleton-line" style="width: 60px;"></div>
                            </div>
                            <div class="skeleton-stat">
                                <div class="skeleton-line small" style="width: 50px;"></div>
                                <div class="skeleton-line" style="width: 70px;"></div>
                            </div>
                        </div>
                        <div class="skeleton-actions">
                            <div class="skeleton-action"></div>
                            <div class="skeleton-action"></div>
                        </div>
                    </div>

                    <!-- کارت اسکلتون دوم -->
                    <div class="skeleton-card">
                        <div class="skeleton-left">
                            <div class="skeleton-icons">
                                <div class="skeleton-icon"></div>
                                <div class="skeleton-icon secondary"></div>
                            </div>
                            <div class="skeleton-details">
                                <div class="skeleton-line short" style="width: 100px;"></div>
                                <div class="skeleton-line medium" style="width: 140px; margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="skeleton-stats">
                            <div class="skeleton-stat">
                                <div class="skeleton-line small" style="width: 50px;"></div>
                                <div class="skeleton-line" style="width: 60px;"></div>
                            </div>
                            <div class="skeleton-stat">
                                <div class="skeleton-line small" style="width: 50px;"></div>
                                <div class="skeleton-line" style="width: 70px;"></div>
                            </div>
                        </div>
                        <div class="skeleton-actions">
                            <div class="skeleton-action"></div>
                            <div class="skeleton-action"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        // تابع ایجاد پیام خالی
        function renderEmpty() {
            positionsList.innerHTML = `
                <div class="empty-container">
                    <div class="empty-icon">🏊</div>
                    <div class="empty-text">فعلاً استخری توسط سایت ما ایجاد نکردید</div>
                    <div class="empty-subtext">با کلیک روی + New اولین استخر خود را ایجاد کنید</div>
                </div>
            `;
        }

        // شروع فرآیند
        // ابتدا اسکلتون (کارت‌های خالی) را نمایش بده
        renderSkeleton();

        // بعد از ۸ ثانیه کارت‌های خالی حذف شده و پیام نهایی نمایش داده می‌شود
        setTimeout(() => {
            renderEmpty();
        }, 8000);
    </script>
</body>
    </html>
