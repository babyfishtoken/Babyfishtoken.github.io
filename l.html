<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>استخر نقدینگی | پوزیشن‌های من</title>
    <!-- فونت‌های اینتر و وزیر -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', 'Inter', sans-serif;
            background: #eef2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            padding: 2rem;
            color: #1e2f3a;
        }

        /* کارت اصلی */
        .main-card {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 35px -12px rgba(17, 45, 65, 0.2);
            overflow: hidden;
            padding: 2.5rem 2.5rem 0 2.5rem;
            border: 1px solid #e3eef7;
        }

        /* ========== تیتر ========== */
        .hero {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 6vw, 3rem);
            font-weight: 650;
            letter-spacing: -0.02em;
            color: #1a3849;
            line-height: 1.2;
        }

        /* ========== زیرتیتر و دکمه کیف پول ========== */
        .subhead-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .subhead {
            font-size: 1rem;
            font-weight: 350;
            color: #3b5b70;
            max-width: 580px;
            margin: 0 auto 1.2rem auto;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #b8cfde;
            text-align: center;
        }

        .wallet-button {
            background: #254e64;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.8rem;
            font-size: 1rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px -3px rgba(20, 55, 75, 0.4);
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #163847;
            margin-bottom: 0.5rem;
        }

        .wallet-button:hover {
            background: #2d5c77;
            transform: translateY(-1px);
        }

        .wallet-dot {
            width: 8px;
            height: 8px;
            background: #4cd964;
            border-radius: 50%;
            display: inline-block;
        }

        .wallet-address {
            font-size: 0.8rem;
            color: #5f7d94;
            background: #e9f0f6;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            direction: ltr;
            display: inline-block;
        }

        /* ========== بخش UNI ========== */
        .uni-section {
            background: #f5f9fc;
            border-radius: 20px;
            padding: 1.5rem 1.8rem;
            border: 1px solid #d0e2ef;
            box-shadow: 0 5px 12px -10px #1b3d4f;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .uni-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .uni-icon {
            width: 48px;
            height: 48px;
            background: #ff6b4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .uni-text h3 {
            font-size: 1.3rem;
            font-weight: 620;
            color: #1f475b;
            margin-bottom: 0.2rem;
        }

        .uni-text p {
            font-size: 0.9rem;
            color: #3b5b70;
        }

        .uni-right {
            text-align: left;
        }

        .rewards-earned {
            font-size: 0.85rem;
            color: #5f7d94;
            margin-bottom: 0.2rem;
        }

        .rewards-amount {
            font-size: 1.5rem;
            font-weight: 650;
            color: #1a3849;
        }

        /* ========== بخش یافتن استخرها ========== */
        .find-pools {
            background: #edf4fa;
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #c5d9ec;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .find-pools p {
            color: #1e3f50;
            font-size: 0.95rem;
        }

        .find-pools-button {
            background: transparent;
            border: 1.5px solid #254e64;
            border-radius: 30px;
            padding: 0.5rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #254e64;
            cursor: pointer;
            transition: all 0.15s;
        }

        .find-pools-button:hover {
            background: #254e64;
            color: white;
        }

        /* ========== بخش پوزیشن‌ها ========== */
        .positions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .positions-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .positions-title h2 {
            font-size: 1.3rem;
            font-weight: 620;
            color: #1f475b;
        }

        .new-button {
            background: #254e64;
            border: none;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #163847;
        }

        .new-button:hover {
            background: #2d5c77;
        }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .filter-dropdown {
            background: white;
            border: 1px solid #cbdbe9;
            border-radius: 30px;
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            color: #1e3f50;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .filter-dropdown:hover {
            background: #f0f7fc;
        }

        /* ========== لیست پوزیشن‌ها ========== */
        .positions-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2.5rem;
            min-height: 300px;
        }

        /* استایل لودینگ */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 0;
            background: #f5f9fc;
            border-radius: 20px;
            border: 1px solid #d0e2ef;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e0e9f2;
            border-top: 4px solid #254e64;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #1f475b;
            font-size: 1rem;
            font-weight: 500;
        }

        /* استایل پیام خالی */
        .empty-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 0;
            background: #f5f9fc;
            border-radius: 20px;
            border: 1px solid #d0e2ef;
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-text {
            color: #1f475b;
            font-size: 1.1rem;
            font-weight: 500;
            text-align: center;
        }

        .empty-subtext {
            color: #5f7d94;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
        }

        /* استایل پوزیشن‌های نمونه (که بعداً حذف می‌شوند) */
        .position-card {
            background: #f5f9fc;
            border-radius: 18px;
            padding: 1.2rem 1.5rem;
            border: 1px solid #d0e2ef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            transition: all 0.15s;
        }

        .position-card:hover {
            background: #ecf3f9;
            border-color: #9fbbd4;
        }

        .position-info {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
        }

        .position-pair {
            display: flex;
            align-items: center;
        }

        .token-icon-small {
            width: 32px;
            height: 32px;
            background: #254e64;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .token-icon-small.secondary {
            background: #5f3e8d;
            margin-right: -8px;
        }

        .position-details {
            margin-right: 0.5rem;
        }

        .position-pair-name {
            font-weight: 620;
            color: #1f475b;
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
        }

        .position-protocol {
            font-size: 0.8rem;
            color: #5f7d94;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .protocol-badge {
            background: #e0e9f2;
            padding: 0.2rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .position-stats {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .stat {
            text-align: right;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #5f7d94;
            margin-bottom: 0.2rem;
        }

        .stat-value {
            font-size: 1rem;
            font-weight: 600;
            color: #1f475b;
        }

        .stat-value.reward {
            color: #e0b354;
        }

        .position-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            border: 1px solid #cbdbe9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #1f475b;
            font-size: 1.1rem;
        }

        .action-icon:hover {
            background: #254e64;
            color: white;
            border-color: #254e64;
        }

        /* ========== فوتر با کپی‌رایت ========== */
        .footer-copyright {
            text-align: center;
            padding: 1.5rem 0.5rem 1.8rem 0.5rem;
            border-top: 1px solid #c2d7e9;
            color: #386277;
            font-size: 0.9rem;
            font-weight: 330;
            margin: 0 -2.5rem;
            padding-left: 2.5rem;
            padding-right: 2.5rem;
            background: #f2f9ff;
        }

        .footer-copyright span {
            font-weight: 430;
            color: #124a61;
        }

        /* ========== ریسپانسیو ========== */
        @media screen and (max-width: 700px) {
            body { padding: 1rem; }
            .main-card { padding: 1.5rem 1.5rem 0 1.5rem; border-radius: 20px; }
            .position-card { flex-direction: column; align-items: flex-start; }
            .position-stats { width: 100%; justify-content: space-between; }
            .position-actions { width: 100%; justify-content: flex-end; }
            .footer-copyright { margin: 0 -1.5rem; padding-left: 1.5rem; padding-right: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="main-card">
        <!-- تیتر -->
        <section class="hero">
            <h1>استخر نقدینگی هوشمند</h1>
        </section>

        <!-- زیرتیتر و دکمه اتصال کیف پول -->
        <div class="subhead-section">
            <div class="subhead">
                مدیریت نقدینگی با بهره‌وری بالا · کاملاً شفاف و سریع
            </div>
            <button class="wallet-button" onclick="alert('اتصال به کیف پول (نسخه آزمایشی)')">
                <span class="wallet-dot"></span>
                ۰x71C...f3E2
            </button>
        </div>

        <!-- بخش UNI (مشابه تصویر) -->
        <div class="uni-section">
            <div class="uni-left">
                <div class="uni-icon">🦄</div>
                <div class="uni-text">
                    <h3>UNI 🐟</h3>
                    <p>Collect rewards</p>
                </div>
            </div>
            <div class="uni-right">
                <div class="rewards-earned">Rewards earned</div>
                <div class="rewards-amount">$۱۲.۴۵</div>
            </div>
        </div>

        <!-- بخش یافتن استخرها -->
        <div class="find-pools">
            <p>Find pools with UNI rewards →</p>
            <button class="find-pools-button" onclick="alert('جستجوی استخرها')">Eligible pools have token rewards so you can earn more</button>
        </div>

        <!-- بخش پوزیشن‌ها -->
        <div class="positions-header">
            <div class="positions-title">
                <h2>Your positions</h2>
                <button class="new-button" onclick="alert('ایجاد پوزیشن جدید')">
                    <span>+ New</span>
                </button>
            </div>
            <div class="filters">
                <div class="filter-dropdown" onclick="alert('فیلتر وضعیت')">
                    Status ▼
                </div>
                <div class="filter-dropdown" onclick="alert('فیلتر پروتکل')">
                    Protocol ▼
                </div>
            </div>
        </div>

        <!-- لیست پوزیشن‌ها - این بخش با جاوااسکریپت مدیریت می‌شود -->
        <div id="positionsList" class="positions-list">
            <!-- محتوا توسط جاوااسکریپت پر می‌شود -->
        </div>

        <!-- کپی‌رایت -->
        <div class="footer-copyright">
            © ۲۰۲۵ استخر نقدینگی هوشمند. تمامی حقوق محفوظ است. | طراحی متوازن و حرفه‌ای
            <span>— Positions v1.0</span>
        </div>
    </div>

    <script>
        // لیست پوزیشن‌های نمونه (که بعد از ۸ ثانیه حذف می‌شوند)
        const samplePositions = [
            {
                pair: "ETH/USDT",
                protocol: "Uniswap V3",
                fee: "0.3%",
                earned: "$1.49",
                liquidity: "$1,234",
                icon1: "ا",
                icon2: "ت",
                icon1Color: "#254e64",
                icon2Color: "#5f3e8d"
            },
            {
                pair: "BTC/USDT",
                protocol: "Curve",
                fee: "0.04%",
                earned: "$11.44",
                liquidity: "$1,458",
                icon1: "ب",
                icon2: "ت",
                icon1Color: "#254e64",
                icon2Color: "#5f3e8d"
            }
        ];

        // عنصر لیست پوزیشن‌ها
        const positionsList = document.getElementById('positionsList');

        // تابع ایجاد پوزیشن‌های نمونه
        function renderSamplePositions() {
            let html = '';
            samplePositions.forEach(pos => {
                html += `
                    <div class="position-card">
                        <div class="position-info">
                            <div class="position-pair">
                                <div class="token-icon-small" style="background: ${pos.icon1Color}">${pos.icon1}</div>
                                <div class="token-icon-small secondary" style="background: ${pos.icon2Color}">${pos.icon2}</div>
                            </div>
                            <div class="position-details">
                                <div class="position-pair-name">${pos.pair}</div>
                                <div class="position-protocol">
                                    <span>${pos.protocol}</span>
                                    <span class="protocol-badge">▪️ ${pos.fee}</span>
                                </div>
                            </div>
                        </div>
                        <div class="position-stats">
                            <div class="stat">
                                <div class="stat-label">Earned</div>
                                <div class="stat-value reward">${pos.earned}</div>
                            </div>
                            <div class="stat">
                                <div class="stat-label">Liquidity</div>
                                <div class="stat-value">${pos.liquidity}</div>
                            </div>
                        </div>
                        <div class="position-actions">
                            <div class="action-icon" onclick="alert('مشاهده جزئیات')">👁️</div>
                            <div class="action-icon" onclick="alert('مدیریت پوزیشن')">⚙️</div>
                        </div>
                    </div>
                `;
            });
            positionsList.innerHTML = html;
        }

        // تابع ایجاد لودینگ
        function renderLoading() {
            positionsList.innerHTML = `
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text">در حال بارگذاری استخرها...</div>
                </div>
            `;
        }

        // تابع ایجاد پیام خالی
        function renderEmpty() {
            positionsList.innerHTML = `
                <div class="empty-container">
                    <div class="empty-icon">🏊</div>
                    <div class="empty-text">فعلاً استخری توسط سایت ما ایجاد نکردید</div>
                    <div class="empty-subtext">با کلیک روی + New اولین استخر خود را ایجاد کنید</div>
                </div>
            `;
        }

        // شروع فرآیند
        // ابتدا لودینگ را نمایش بده
        renderLoading();

        // بعد از ۲ ثانیه (برای دیدن لودینگ) پوزیشن‌های نمونه را نمایش بده
        setTimeout(() => {
            renderSamplePositions();
        }, 2000);

        // بعد از ۸ ثانیه پوزیشن‌های نمونه را حذف کن و پیام خالی نمایش بده
        setTimeout(() => {
            renderEmpty();
        }, 8000);
    </script>
</body>
                </html>
