<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قیمت لحظه‌ای ارزهای دیجیتال</title>
    <!-- فونت وزیر (متن) و فونت آیکون‌ها -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazir', 'Segoe UI', Tahoma, Arial, sans-serif;
        }

        @font-face {
            font-family: 'Vazir';
            src: url('https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/Vazir.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: linear-gradient(145deg, #f4f6fb 0%, #eef0f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            transition: background 0.3s ease;
        }

        /* حالت تاریک (با کلاس روی body) */
        body.dark-mode {
            background: linear-gradient(145deg, #1e2029 0%, #2b2e3a 100%);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15), 0 10px 25px rgba(0, 20, 50, 0.1);
            width: 100%;
            max-width: 900px;
            padding: 32px 28px;
            border: 1px solid rgba(255,255,255,0.5);
            transition: background 0.3s, box-shadow 0.3s;
        }

        body.dark-mode .card {
            background: rgba(35, 38, 47, 0.85);
            backdrop-filter: blur(15px);
            border-color: rgba(80, 90, 120, 0.4);
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
        }

        /* هدر و دکمه تغییر تم */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2b32b2, #1488cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .title-section p {
            color: #5b677b;
            font-size: 1rem;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        body.dark-mode .title-section p {
            color: #aab3c5;
        }

        .theme-toggle {
            background: white;
            border: none;
            border-radius: 60px;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,20,50,0.1);
            transition: 0.2s;
            border: 1px solid #ddd;
        }

        body.dark-mode .theme-toggle {
            background: #2f3545;
            border-color: #40475a;
            color: #f0f2f5;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .theme-toggle i {
            font-size: 1.3rem;
        }

        /* شبکه کارت‌ها */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 22px;
            margin: 30px 0 20px;
        }

        .coin-card {
            background: white;
            border-radius: 32px;
            padding: 28px 20px 24px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            transition: transform 0.25s, box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.7);
            backdrop-filter: blur(5px);
        }

        body.dark-mode .coin-card {
            background: #262b37;
            border-color: #3d4355;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4);
        }

        .coin-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 40px rgba(20, 40, 100, 0.2);
        }

        body.dark-mode .coin-card:hover {
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.7);
        }

        .coin-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            background: linear-gradient(145deg, #f0f4ff, #dde3f0);
            box-shadow: inset 0 -3px 8px rgba(0,0,0,0.02), 0 12px 18px -10px rgba(20, 60, 200, 0.3);
        }

        body.dark-mode .coin-icon {
            background: #2d3445;
            box-shadow: 0 15px 20px -8px #0b0e14;
        }

        /* رنگ‌های خاص برای هر توکن */
        .matic .coin-icon { color: #8247E5; }      /* بنفش پالیگان */
        .usdt .coin-icon { color: #26A17B; }       /* سبز تتر */

        .coin-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .coin-name small {
            font-size: 1rem;
            font-weight: 400;
            color: #6e7b91;
        }

        body.dark-mode .coin-name small {
            color: #9aa6bb;
        }

        .price {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 10px 0 5px;
            line-height: 1.2;
        }

        .price-dollar {
            font-size: 1.3rem;
            opacity: 0.7;
        }

        .update-time {
            font-size: 0.9rem;
            color: #6f7d98;
            margin-top: 18px;
            border-top: 1px dashed #cbd5e1;
            padding-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        body.dark-mode .update-time {
            color: #a0aec6;
            border-top-color: #3e4558;
        }

        .update-time i {
            font-size: 0.8rem;
        }

        /* وضعیت خطا یا بارگذاری */
        .error-message {
            color: #b91c1c;
            background: #fee2e2;
            border-radius: 30px;
            padding: 8px 20px;
            text-align: center;
            display: inline-block;
            margin: 10px auto 0;
        }

        body.dark-mode .error-message {
            background: #4e2e2e;
            color: #ffb3b3;
        }

        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(100, 100, 255, 0.2);
            border-radius: 50%;
            border-top-color: #2b32b2;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 0.95rem;
            color: #6b7a93;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        body.dark-mode .footer-note {
            color: #9da9c0;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: #2b32b2;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            margin-left: 5px;
        }

        body.dark-mode .refresh-btn {
            color: #77aaff;
        }

        .refresh-btn:hover {
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- هدر و دکمه تغییر تم -->
        <div class="header">
            <div class="title-section">
                <h1>📊 قیمت لحظه‌ای توکن‌ها</h1>
                <p><i class="fa fa-clock-o"></i> به‌روزرسانی خودکار هر ۳۰ ثانیه</p>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <i class="fa fa-moon-o" id="themeIcon"></i>
                <span>حالت شب</span>
            </button>
        </div>

        <!-- شبکه قیمت‌ها -->
        <div class="price-grid">
            <!-- کارت پالیگان (MATIC) -->
            <div class="coin-card matic" id="matic-card">
                <div class="coin-icon">
                    <i class="fa fa-cube" aria-hidden="true"></i>
                </div>
                <div class="coin-name">
                    پالیگان <small>MATIC</small>
                </div>
                <div class="price" id="matic-price">
                    <span class="loading" style="width:30px; height:30px;"></span>
                </div>
                <div class="update-time" id="matic-update">
                    <i class="fa fa-refresh"></i> در حال دریافت...
                </div>
            </div>

            <!-- کارت تتر (USDT) -->
            <div class="coin-card usdt" id="usdt-card">
                <div class="coin-icon">
                    <i class="fa fa-dollar" aria-hidden="true"></i>
                </div>
                <div class="coin-name">
                    تتر <small>USDT</small>
                </div>
                <div class="price" id="usdt-price">
                    <span class="loading" style="width:30px; height:30px;"></span>
                </div>
                <div class="update-time" id="usdt-update">
                    <i class="fa fa-refresh"></i> در حال دریافت...
                </div>
            </div>
        </div>

        <!-- پیغام خطا (در صورت بروز مشکل) -->
        <div id="error-container" style="text-align: center; min-height: 40px;"></div>

        <!-- فوتر و دکمه دستی بروزرسانی -->
        <div class="footer-note">
            <span>منبع: <strong>Price Fetcher API (Binance)</strong></span>
            <button class="refresh-btn" id="manualRefresh" title="بروزرسانی دستی">
                <i class="fa fa-repeat"></i>
            </button>
        </div>
    </div>

    <script>
        (function() {
            // المنت‌های DOM
            const maticPriceEl = document.getElementById('matic-price');
            const usdtPriceEl = document.getElementById('usdt-price');
            const maticUpdateEl = document.getElementById('matic-update');
            const usdtUpdateEl = document.getElementById('usdt-update');
            const errorContainer = document.getElementById('error-container');
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');

            // وضعیت dark mode (بررسی localStorage)
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                themeIcon.className = 'fa fa-sun-o';
                themeToggle.querySelector('span').innerText = 'حالت روشن';
            } else {
                themeIcon.className = 'fa fa-moon-o';
                themeToggle.querySelector('span').innerText = 'حالت شب';
            }

            // تغییر تم
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const darkNow = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', darkNow);
                if (darkNow) {
                    themeIcon.className = 'fa fa-sun-o';
                    themeToggle.querySelector('span').innerText = 'حالت روشن';
                } else {
                    themeIcon.className = 'fa fa-moon-o';
                    themeToggle.querySelector('span').innerText = 'حالت شب';
                }
            });

            // تابع نمایش خطا
            function showError(message) {
                errorContainer.innerHTML = `<div class="error-message"><i class="fa fa-exclamation-triangle"></i> ${message}</div>`;
            }

            function clearError() {
                errorContainer.innerHTML = '';
            }

            // تابع برای دریافت قیمت از API (با CORS proxy امن)
            async function fetchPrice(token, quote = 'USD') {
                // توجه: از یک پروکسی رایگان و پراکسی برای جلوگیری از CORS در مرورگر استفاده می‌کنیم.
                // در محیط واقعی می‌توانی از بک‌اند خودت استفاده کنی.
                const proxyUrl = 'https://corsproxy.io/?';
                const targetUrl = `https://price-fetcher.api2fetch.com/price?token=${token}&quote=${quote}`;
                const url = proxyUrl + encodeURIComponent(targetUrl);
                
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                if (data && typeof data.price === 'number') {
                    return { price: data.price, source: data.source || 'api' };
                } else {
                    throw new Error('ساختار پاسخ نامعتبر است');
                }
            }

            // به‌روزرسانی همزمان هر دو توکن
            async function updateAllPrices() {
                clearError();
                // نمایش لودر داخل هر کارت (متن قبلی رو موقتاً پاک می‌کنیم)
                maticPriceEl.innerHTML = '<span class="loading" style="width:30px; height:30px;"></span>';
                usdtPriceEl.innerHTML = '<span class="loading" style="width:30px; height:30px;"></span>';
                
                try {
                    // درخواست موازی برای سرعت بیشتر
                    const [maticData, usdtData] = await Promise.allSettled([
                        fetchPrice('MATIC', 'USD'),
                        fetchPrice('USDT', 'USD')
                    ]);

                    // پردازش نتیجه MATIC
                    if (maticData.status === 'fulfilled') {
                        const price = maticData.value.price;
                        maticPriceEl.innerHTML = `$${price.toFixed(4)} <span class="price-dollar">USD</span>`;
                        const now = new Date();
                        maticUpdateEl.innerHTML = `<i class="fa fa-clock-o"></i> ${now.toLocaleTimeString('fa-IR')} · منبع: ${maticData.value.source}`;
                    } else {
                        maticPriceEl.innerHTML = '⚠️ خطا';
                        maticUpdateEl.innerHTML = '<i class="fa fa-exclamation-circle"></i> عدم دریافت';
                        console.error('MATIC error:', maticData.reason);
                    }

                    // پردازش نتیجه USDT
                    if (usdtData.status === 'fulfilled') {
                        const price = usdtData.value.price;
                        usdtPriceEl.innerHTML = `$${price.toFixed(4)} <span class="price-dollar">USD</span>`;
                        const now = new Date();
                        usdtUpdateEl.innerHTML = `<i class="fa fa-clock-o"></i> ${now.toLocaleTimeString('fa-IR')} · منبع: ${usdtData.value.source}`;
                    } else {
                        usdtPriceEl.innerHTML = '⚠️ خطا';
                        usdtUpdateEl.innerHTML = '<i class="fa fa-exclamation-circle"></i> عدم دریافت';
                        console.error('USDT error:', usdtData.reason);
                    }

                    // اگر هر دو خطا دادند، خطای کلی نمایش بده
                    if (maticData.status === 'rejected' && usdtData.status === 'rejected') {
                        showError('در دریافت قیمت‌ها مشکلی پیش آمد. اینترنت را بررسی کن.');
                    } else if (maticData.status === 'rejected' || usdtData.status === 'rejected') {
                        // فقط یکی خطا داره، یک اخطار کوچک نمایش بده (اختیاری)
                        errorContainer.innerHTML = `<div class="error-message" style="background: #fff3cd; color: #856404;">⚠️ دریافت یکی از نمادها با مشکل مواجه شد.</div>`;
                    }
                } catch (err) {
                    console.error('Unexpected error:', err);
                    showError('خطای غیرمنتظره. لطفاً صفحه را مجدداً بارگذاری کن.');
                }
            }

            // تابع برای بروزرسانی دستی
            function manualUpdate() {
                updateAllPrices();
            }

            // اجرای اولیه و ست بازه زمانی (هر ۳۰ ثانیه)
            updateAllPrices();
            const intervalId = setInterval(updateAllPrices, 30000); // 30000 ms = 30 ثانیه

            // دکمه دستی بروزرسانی
            document.getElementById('manualRefresh').addEventListener('click', function(e) {
                e.preventDefault();
                manualUpdate();
            });

            // (اختیاری) هنگام خروج از صفحه interval پاک شود (بهتر است)
            window.addEventListener('beforeunload', function() {
                clearInterval(intervalId);
            });
        })();
    </script>
</body>
                  </html>
