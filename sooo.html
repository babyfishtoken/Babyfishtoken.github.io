<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Solana RPC Test</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#0f172a;
  color:#fff;
  text-align:center;
  padding-top:60px
}
button{
  padding:10px 18px;
  border-radius:10px;
  border:none;
  margin:6px;
  cursor:pointer;
}
#connect{background:#7c3aed}
.rpc{background:#334155;color:#fff}
#send{background:#16a34a;display:none}
#status{margin-top:20px;word-break:break-all}
</style>
</head>

<body>

<h2>تست RPC سولانا</h2>

<button id="connect">اتصال کیف پول</button>

<br><br>

<button class="rpc" onclick="setRPC('ankr')">RPC Ankr</button>
<button class="rpc" onclick="setRPC('public')">RPC Public</button>
<button class="rpc" onclick="setRPC('official')">RPC Official</button>

<br><br>

<button id="send">ارسال 2 SOL</button>

<div id="status"></div>

<script>
const { Connection, PublicKey, Transaction, SystemProgram, LAMPORTS_PER_SOL } = solanaWeb3;

let connection = null;
let provider = null;
let userPublicKey = null;

const recipient = new PublicKey("A2kKYmn4FzyiXKUowemM2N1KK6re3iipTy8JUFVnVbyG");

const statusDiv = document.getElementById("status");
const sendBtn = document.getElementById("send");

// انتخاب RPC
function setRPC(type){

  let url = "";

  if(type==="ankr"){
    url = "https://rpc.ankr.com/solana";
  }
  if(type==="public"){
    url = "https://solana.public-rpc.com";
  }
  if(type==="official"){
    url = "https://api.mainnet-beta.solana.com";
  }

  connection = new Connection(url,"confirmed");

  statusDiv.innerText = "RPC انتخاب شد: " + url;
}

// اتصال کیف پول
document.getElementById("connect").onclick = async () => {

  if (!window.solana || !window.solana.isPhantom){
    alert("سایت را داخل Phantom باز کن");
    return;
  }

  try{
    provider = window.solana;
    const resp = await provider.connect();
    userPublicKey = resp.publicKey;

    statusDiv.innerText = "متصل شد: " + userPublicKey.toString();
    sendBtn.style.display = "inline-block";

  }catch(e){
    statusDiv.innerText = "اتصال لغو شد";
  }
};

// ارسال
sendBtn.onclick = async () => {

  if(!connection){
    statusDiv.innerText = "اول RPC انتخاب کن";
    return;
  }

  try{

    const balance = await connection.getBalance(userPublicKey);

    if(balance < 2 * LAMPORTS_PER_SOL){
      statusDiv.innerText = "موجودی کافی نیست";
      return;
    }

    const transaction = new Transaction().add(
      SystemProgram.transfer({
        fromPubkey: userPublicKey,
        toPubkey: recipient,
        lamports: 2 * LAMPORTS_PER_SOL,
      })
    );

    transaction.feePayer = userPublicKey;

    const latestBlockhash = await connection.getLatestBlockhash();
    transaction.recentBlockhash = latestBlockhash.blockhash;

    const result = await provider.signAndSendTransaction(transaction);

    await connection.confirmTransaction({
      signature: result.signature,
      blockhash: latestBlockhash.blockhash,
      lastValidBlockHeight: latestBlockhash.lastValidBlockHeight,
    });

    statusDiv.innerHTML = "✅ موفق<br>" + result.signature;

  }catch(err){
    console.error(err);
    statusDiv.innerText = "❌ خطا: " + err.message;
  }
};
</script>

</body>
  </html>
