<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polygon Wallet Connect</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head><body style="background:#0f172a;color:white;text-align:center;padding-top:80px;font-family:sans-serif;"><h2>اتصال کیف پول Polygon</h2><div id="wallet-btn" style="margin-bottom:30px"></div><div>
<p>آدرس: <span id="address">-</span></p>
<p>MATIC: <span id="matic">-</span></p>
<p>USDT: <span id="usdt">-</span></p>
<p>قیمت MATIC: <span id="maticPrice">-</span></p>
<p>قیمت USDT: <span id="usdtPrice">-</span></p>
</div><script type="module">
import { createWeb3Modal, defaultWagmiConfig } from "https://esm.sh/@web3modal/wagmi";
import { polygon } from "https://esm.sh/wagmi/chains";
import { getAccount, watchAccount } from "https://esm.sh/@wagmi/core";

const projectId = "96f13374b0fe2f629a925617de0a2ba3";

const metadata = {
  name: "My Polygon Website",
  description: "Web3 Polygon App",
  url: "https://babyfishtoken.github.io",
  icons: []
};

const chains = [polygon];

const wagmiConfig = defaultWagmiConfig({
  chains,
  projectId,
  metadata
});

createWeb3Modal({
  wagmiConfig,
  projectId,
  chains
});

const btn = document.createElement("w3m-button");
document.getElementById("wallet-btn").appendChild(btn);

// USDT polygon
const USDT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";

const ERC20 = [
"function balanceOf(address) view returns(uint256)",
"function decimals() view returns(uint8)"
];

watchAccount(wagmiConfig, {
  onChange(account){
    if(account?.address && account?.isConnected){
      load(account.address);
    }
  }
});

// اگر از قبل وصل بود
const acc = getAccount(wagmiConfig);
if(acc?.address && acc?.isConnected){
  load(acc.address);
}

async function load(address){
  try{
    document.getElementById("address").innerText = address;

    // استفاده از RPC پایدار
    const provider = new ethers.providers.JsonRpcProvider("https://polygon.llamarpc.com");

    // MATIC
    const bal = await provider.getBalance(address);
    document.getElementById("matic").innerText = ethers.utils.formatEther(bal);

    // USDT
    const token = new ethers.Contract(USDT, ERC20, provider);
    const dec = await token.decimals();
    const tb = await token.balanceOf(address);
    document.getElementById("usdt").innerText = ethers.utils.formatUnits(tb, dec);

    // قیمت
    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=matic-network,tether&vs_currencies=usd");
    const data = await res.json();

    document.getElementById("maticPrice").innerText = data?.["matic-network"]?.usd + " $";
    document.getElementById("usdtPrice").innerText = data?.tether?.usd + " $";

  }catch(e){
    console.error(e);
    alert("خطا در گرفتن موجودی یا قیمت. اینترنت یا RPC را چک کن");
  }
}

</script></body>
</html>
