<!DOCTYPE html><html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polygon Balance Viewer</title>
</head><body style="background:#0f172a;color:white;font-family:sans-serif;padding:20px;text-align:center;"><h2>💰 موجودی کیف پول (Polygon)</h2><div id="wallet-btn"></div>
<div id="walletAddress" style="margin:10px;color:#94a3b8;font-size:14px;"></div><div id="result" style="margin-top:20px;"></div><script type="module">
import { createWeb3Modal, defaultWagmiConfig } from "https://esm.sh/@web3modal/wagmi";
import { polygon } from "https://esm.sh/wagmi/chains";
import { getAccount, watchAccount, readContract, getBalance } from "https://esm.sh/wagmi/actions";
import { formatUnits, formatEther } from "https://esm.sh/viem";

// ==================== تنظیمات ====================
const projectId = "96f13374b0fe2f629a925617de0a2ba3";
const chains = [polygon];

const wagmiConfig = defaultWagmiConfig({
    chains,
    projectId,
    metadata: { name: "Balance Viewer", description: "", url: window.location.href, icons: [] }
});

createWeb3Modal({ wagmiConfig, projectId, chains });

const btn = document.createElement("w3m-button");
document.getElementById("wallet-btn").appendChild(btn);

// ==================== USDT Polygon ====================
const USDT_ADDRESS = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174";

const ERC20_ABI = [
    { name: "symbol", type: "function", stateMutability: "view", inputs: [], outputs: [{ type: "string" }] },
    { name: "decimals", type: "function", stateMutability: "view", inputs: [], outputs: [{ type: "uint8" }] },
    { name: "balanceOf", type: "function", stateMutability: "view", inputs: [{ type: "address" }], outputs: [{ type: "uint256" }] }
];

// ==================== وضعیت کیف پول ====================
let currentAccount = null;

watchAccount(wagmiConfig, {
    async onChange(account) {
        if (account?.address) {
            currentAccount = account.address;
            document.getElementById('walletAddress').innerText = `✅ ${account.address.slice(0,6)}...${account.address.slice(38)}`;
            await loadBalances();
        } else {
            currentAccount = null;
            document.getElementById('walletAddress').innerText = '';
            document.getElementById('result').innerHTML = '';
        }
    }
});

// اگر قبلاً وصل بوده
const acc = getAccount(wagmiConfig);
if (acc?.address) {
    currentAccount = acc.address;
    loadBalances();
}

// ==================== گرفتن موجودی ====================
async function loadBalances() {
    try {
        if (!currentAccount) return;

        document.getElementById('result').innerHTML = "⏳ در حال دریافت اطلاعات...";

        // MATIC
        const nativeBalance = await getBalance(wagmiConfig, {
            address: currentAccount,
            chainId: 137
        });

        const matic = formatEther(nativeBalance.value);

        // USDT
        const [decimals, balance] = await Promise.all([
            readContract(wagmiConfig, {
                address: USDT_ADDRESS,
                abi: ERC20_ABI,
                functionName: 'decimals',
                chainId: 137
            }),
            readContract(wagmiConfig, {
                address: USDT_ADDRESS,
                abi: ERC20_ABI,
                functionName: 'balanceOf',
                args: [currentAccount],
                chainId: 137
            })
        ]);

        const usdt = formatUnits(balance, decimals);

        // قیمت از CoinGecko
        const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=matic-network,tether&vs_currencies=usd");
        const priceData = await res.json();

        const maticPrice = priceData?.["matic-network"]?.usd ?? 0;
        const usdtPrice = priceData?.tether?.usd ?? 0;

        document.getElementById('result').innerHTML = `
            <div style="background:#1e293b;padding:20px;border-radius:8px;margin-bottom:15px;">
                <div style="color:#94a3b8;">MATIC</div>
                <div style="font-size:28px;font-weight:bold;color:#3b82f6;">${parseFloat(matic).toFixed(4)}</div>
                <div style="color:#22c55e;">$ ${maticPrice}</div>
            </div>

            <div style="background:#1e293b;padding:20px;border-radius:8px;">
                <div style="color:#94a3b8;">USDT</div>
                <div style="font-size:28px;font-weight:bold;color:#3b82f6;">${parseFloat(usdt).toFixed(2)}</div>
                <div style="color:#22c55e;">$ ${usdtPrice}</div>
            </div>
        `;

    } catch (error) {
        document.getElementById('result').innerHTML = `<div style="color:#ef4444;">❌ خطا: ${error.message.slice(0,60)}</div>`;
    }
}

</script></body>
</html>
