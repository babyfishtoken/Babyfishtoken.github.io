<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polygon Wallet</title>
</head>

<body style="background:#0f172a;color:white;text-align:center;padding-top:80px;font-family:sans-serif;">

<h2>💰 موجودی کیف پول Polygon</h2>

<div id="wallet-btn"></div>

<br><br>

<div id="result"></div>

<script type="module">

import { createWeb3Modal, defaultWagmiConfig } 
from "https://esm.sh/@web3modal/wagmi";

import { polygon } 
from "https://esm.sh/wagmi/chains";

import { getAccount, watchAccount, getBalance, readContract } 
from "https://esm.sh/wagmi";

const projectId = "96f13374b0fe2f629a925617de0a2ba3";

const wagmiConfig = defaultWagmiConfig({
  chains: [polygon],
  projectId,
  metadata: { name: "Polygon Wallet", description: "", url: window.location.href, icons: [] }
});

createWeb3Modal({
  wagmiConfig,
  projectId,
  chains: [polygon]
});

const btn = document.createElement("w3m-button");
document.getElementById("wallet-btn").appendChild(btn);

// ==================== USDT ====================
const USDT = "0x2791Bca1f2de4661ED88A30C99A7a9449Aa84174";

const ABI = [
  {
    "constant": true,
    "inputs": [{"name": "_owner","type": "address"}],
    "name": "balanceOf",
    "outputs": [{"name": "balance","type": "uint256"}],
    "type": "function"
  }
];

// ==================== گرفتن قیمت ====================
async function getPrices(){

  const res = await fetch(
    "https://api.binance.com/api/v3/ticker/price?symbols=[\"MATICUSDT\"]"
  );

  const data = await res.json();

  return {
    matic: parseFloat(data[0].price),
    usdt: 1
  };
}

// ==================== گرفتن موجودی ====================
async function load(address){

  try{

    document.getElementById("result").innerHTML = "⏳ در حال دریافت...";

    // MATIC
    const matic = await getBalance(wagmiConfig, {
      address,
      chainId: polygon.id
    });

    const maticBal = Number(matic.formatted);

    // USDT
    const usdt = await readContract(wagmiConfig, {
      address: USDT,
      abi: ABI,
      functionName: "balanceOf",
      args: [address],
      chainId: polygon.id
    });

    const usdtBal = Number(usdt) / 1e6;

    // قیمت
    const prices = await getPrices();

    const maticValue = maticBal * prices.matic;
    const usdtValue = usdtBal * prices.usdt;

    document.getElementById("result").innerHTML = `

      <div style="background:#1e293b;padding:20px;border-radius:10px;margin-bottom:15px;">
        <h3>MATIC</h3>
        <h2>${maticBal.toFixed(4)}</h2>
        <div>قیمت: $${prices.matic.toFixed(4)}</div>
        <div>ارزش: $${maticValue.toFixed(2)}</div>
      </div>

      <div style="background:#1e293b;padding:20px;border-radius:10px;">
        <h3>USDT</h3>
        <h2>${usdtBal.toFixed(2)}</h2>
        <div>قیمت: $1</div>
        <div>ارزش: $${usdtValue.toFixed(2)}</div>
      </div>

    `;

  }catch(e){
    document.getElementById("result").innerHTML =
      "❌ خطا در دریافت اطلاعات";
    console.log(e);
  }
}

// ==================== اتصال ====================
watchAccount(wagmiConfig, {
  onChange(acc){
    if(acc?.address && acc?.isConnected){
      load(acc.address);
    }
  }
});

const acc = getAccount(wagmiConfig);
if(acc?.address && acc?.isConnected){
  load(acc.address);
}

</script>

</body>
</html>
