<!DOCTYPE html><html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اتصال کیف پول | Polygon + USDT</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script src="https://unpkg.com/@walletconnect/ethereum-provider@2.11.0/dist/index.umd.js"></script>
  <style>
    body {font-family: sans-serif; background:#0f0f0f; color:#fff; padding:20px}
    button {padding:12px 20px; border:none; border-radius:10px; background:#8a2be2; color:#fff; font-size:16px}
    .card {margin-top:20px; padding:20px; border-radius:15px; background:#1b1b1b}
  </style>
</head>
<body><h2>اتصال کیف پول WalletConnect</h2>
<button onclick="connectWallet()">اتصال کیف پول</button><div class="card">
  <p>آدرس: <span id="address">-</span></p>
  <p>موجودی MATIC: <span id="matic">-</span></p>
  <p>موجودی USDT: <span id="usdt">-</span></p>
  <p>قیمت MATIC: <span id="maticPrice">-</span></p>
  <p>قیمت USDT: <span id="usdtPrice">-</span></p>
</div><script>

let provider;
let signer;

// USDT Polygon
const USDT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";

const ERC20_ABI = [
  "function balanceOf(address owner) view returns (uint256)",
  "function decimals() view returns (uint8)"
];

async function connectWallet(){
  try{
    provider = new window.EthereumProvider.default({
      projectId: "96f13374b0fe2f629a925617de0a2ba3",
      chains: [137],
      showQrModal: true
    });

    await provider.enable();

    const ethersProvider = new ethers.providers.Web3Provider(provider);
    signer = ethersProvider.getSigner();

    const address = await signer.getAddress();
    document.getElementById("address").innerText = address;

    loadBalances(ethersProvider, address);
    loadPrices();

  }catch(e){
    alert(e.message);
  }
}

async function loadBalances(ethersProvider, address){

  // MATIC
  const balance = await ethersProvider.getBalance(address);
  document.getElementById("matic").innerText = ethers.utils.formatEther(balance);

  // USDT
  const usdt = new ethers.Contract(USDT, ERC20_ABI, ethersProvider);
  const dec = await usdt.decimals();
  const bal = await usdt.balanceOf(address);

  document.getElementById("usdt").innerText = ethers.utils.formatUnits(bal, dec);
}

async function loadPrices(){
  try{

    const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=matic-network,tether&vs_currencies=usd");
    const data = await res.json();

    document.getElementById("maticPrice").innerText = data["matic-network"].usd + " $";
    document.getElementById("usdtPrice").innerText = data["tether"].usd + " $";

  }catch(e){
    console.log(e);
  }
}

</script></body>
</html>
